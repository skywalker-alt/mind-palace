document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ue-deep:      #1D4ED8;  /* hover / pressed state */\n  --eko-blue-soft:      #EFF6FF;  /* tint background for chips, soft fills */\n\n  --deep-navy:          #111827;  /* anchor color for typography */\n  --deep-black:         #12151D;  /* used for mascot facial features + strong contrast */\n\n  --pure-white:         #FFFFFF;\n  --soft-cream:         #F3F1E8;  /* secondary background (per extended palette) */\n\n  /* ---------- EXTENDED PLAYFUL PALETTE ---------- */\n  --vibrant-red:        #E11D48;  /* urgency, passion, \"human\" energy */\n  --energy-yellow:      #FBBF24;  /* optimism, highlights */\n  --olive-green:        #84CC16;  /* growth, \"go\" signals */\n\n  /* ---------- NEUTRALS ---------- */\n  --slate-900:          #0F172A;\n  --slate-700:          #334155;\n  --slate-600:          #475569;\n  --slate-500:          #64748B;\n  --slate-300:          #CBD5E1;\n  --slate-200:          #E2E8F0;\n  --slate-100:          #F1F5F9;\n  --slate-50:           #F8FAFC;\n  --bg-page:            #F5F5F5;  /* page background used in website */\n\n  /* ---------- SEMANTIC FG / BG ---------- */\n  --fg-1:               var(--deep-navy);   /* primary text */\n  --fg-2:               var(--slate-600);   /* secondary text */\n  --fg-3:               var(--slate-500);   /* tertiary / metadata */\n  --fg-inverse:         var(--pure-white);\n  --fg-brand:           var(--eko-blue);\n\n  --bg-1:               var(--pure-white);  /* primary surface */\n  --bg-2:               var(--soft-cream);  /* warm secondary surface */\n  --bg-3:               var(--slate-50);    /* cool secondary surface */\n  --bg-page-default:    var(--bg-page);\n\n  --border-subtle:      rgba(0, 0, 0, 0.05);\n  --border-default:     var(--slate-200);\n  --border-strong:      var(--slate-300);\n\n  /* ---------- ELEVATION ---------- */\n  --shadow-xs:          0 1px 2px 0 rgba(0, 0, 0, 0.05);\n  --shadow-sm:          0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -1px rgba(0, 0, 0, 0.04);\n  --shadow-md:          0 10px 20px -4px rgba(0, 102, 255, 0.12);\n  --shadow-lg:          0 25px 50px -12px rgba(0, 0, 0, 0.18);\n  --shadow-xl:          0 40px 100px rgba(0, 0, 0, 0.08);\n\n  /* ---------- RADII ---------- */\n  --radius-xs:          6px;\n  --radius-sm:          8px;\n  --radius-md:          12px;\n  --radius-lg:          20px;\n  --radius-xl:          24px;\n  --radius-2xl:         32px;\n  --radius-pill:        9999px;\n\n  /* ---------- SPACING SCALE (4pt) ---------- */\n  --space-1:            4px;\n  --space-2:            8px;\n  --space-3:            12px;\n  --space-4:            16px;\n  --space-5:            20px;\n  --space-6:            24px;\n  --space-8:            32px;\n  --space-10:           40px;\n  --space-12:           48px;\n  --space-16:           64px;\n  --space-20:           80px;\n  --space-24:           96px;\n  --space-32:           128px;\n\n  /* ---------- MOTION ---------- */\n  --ease-out-soft:      cubic-bezier(0.16, 1, 0.3, 1);  /* signature ease used in App.jsx */\n  --ease-standard:      cubic-bezier(0.4, 0, 0.2, 1);\n  --duration-fast:      150ms;\n  --duration-base:      300ms;\n  --duration-slow:      600ms;\n\n  /* ---------- TYPE TOKENS ---------- */\n  --font-display:       'Montserrat', 'Segoe UI', system-ui, -apple-system, sans-serif;\n  --font-body:          'Montserrat', 'Segoe UI', system-ui, -apple-system, sans-serif;\n  --font-mono:          ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace;\n\n  --fw-regular:         400;\n  --fw-medium:          500;\n  --fw-semibold:        600;\n  --fw-bold:            700;\n  --fw-extrabold:       800;\n\n  --tracking-tight:     -0.04em;\n  --tracking-snug:      -0.02em;\n  --tracking-wide:      0.15em;\n\n  --leading-tight:      1.1;\n  --leading-snug:       1.2;\n  --leading-base:       1.5;\n  --leading-loose:      1.7;\n\n  /* fluid type ramp */\n  --fs-display:         clamp(48px, 6vw, 84px);\n  --fs-h1:              clamp(36px, 4.5vw, 64px);\n  --fs-h2:              clamp(28px, 3vw, 42px);\n  --fs-h3:              clamp(20px, 2vw, 28px);\n  --fs-h4:              18px;\n  --fs-body-lg:         18px;\n  --fs-body:            16px;\n  --fs-body-sm:         14px;\n  --fs-caption:         12px;\n}\n\n/* =====================================================================\n   Semantic type classes — apply directly or use as @extends.\n   ===================================================================== */\n.eko-display {\n  font-family: var(--font-display);\n  font-weight: var(--fw-extrabold);\n  font-size: var(--fs-display);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--fg-1);\n}\n\n.eko-h1 {\n  font-family: var(--font-display);\n  font-weight: var(--fw-bold);\n  font-size: var(--fs-h1);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-snug);\n  color: var(--fg-1);\n}\n\n.eko-h2 {\n  font-family: var(--font-display);\n  font-weight: var(--fw-extrabold);\n  font-size: var(--fs-h2);\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-snug);\n  color: var(--fg-1);\n}\n\n.eko-h3 {\n  font-family: var(--font-display);\n  font-weight: var(--fw-bold);\n  font-size: var(--fs-h3);\n  line-height: var(--leading-snug);\n  color: var(--fg-1);\n}\n\n.eko-h4 {\n  font-family: var(--font-display);\n  font-weight: var(--fw-semibold);\n  font-size: var(--fs-h4);\n  line-height: 1.4;\n  color: var(--fg-1);\n}\n\n.eko-eyebrow {\n  font-family: var(--font-body);\n  font-size: var(--fs-caption);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--tracking-wide);\n  text-transform: uppercase;\n  color: var(--fg-brand);\n}\n\n.eko-body-lg {\n  font-family: var(--font-body);\n  font-size: var(--fs-body-lg);\n  font-weight: var(--fw-medium);\n  line-height: var(--leading-base);\n  color: var(--fg-2);\n}\n\n.eko-body {\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  font-weight: var(--fw-regular);\n  line-height: var(--leading-base);\n  color: var(--fg-2);\n}\n\n.eko-body-sm {\n  font-family: var(--font-body);\n  font-size: var(--fs-body-sm);\n  font-weight: var(--fw-medium);\n  line-height: var(--leading-base);\n  color: var(--fg-2);\n}\n\n.eko-caption {\n  font-family: var(--font-body);\n  font-size: var(--fs-caption);\n  font-weight: var(--fw-semibold);\n  line-height: 1.4;\n  color: var(--fg-3);\n}\n\n.eko-mono {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  letter-spacing: 0;\n}\n\n/* brand wordmark — always lowercase, brand blue */\n.eko-wordmark {\n  color: var(--eko-blue);\n  text-transform: lowercase;\n  font-weight: var(--fw-extrabold);\n}\n<\u002Fstyle>\n  <style>\n    html, body { margin: 0; padding: 0; }\n    * { box-sizing: border-box; }\n    ::placeholder { color: #B6BCC6; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; width:100%; background:#F1EEE4; font-family:'Montserrat','Segoe UI',system-ui,sans-serif; display:flex; flex-direction:column; align-items:center; padding:34px 24px 56px;\">\n\n  <!-- masthead -->\n  <div style=\"width:100%; max-width:1160px; display:flex; align-items:center; justify-content:space-between; margin-bottom:22px;\">\n    <div style=\"display:flex; align-items:center; gap:12px;\">\n      <img src=\"19cb5282-aa43-49ed-ad60-3a08e72ad94e\" alt=\"eko\" style=\"height:40px; width:40px; object-fit:contain;\">\n      <div style=\"display:flex; align-items:baseline; gap:8px;\">\n        <span style=\"font-size:21px; font-weight:800; letter-spacing:-0.02em; color:#111827;\">eko<\u002Fspan>\n        <span style=\"font-size:14px; font-weight:600; color:#94A3B8; letter-spacing:0.01em;\">notebook<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align:right;\">\n      <div style=\"font-size:16px; font-weight:700; color:#111827; letter-spacing:-0.01em;\">{{ greeting }}<\u002Fdiv>\n      <div style=\"font-size:12.5px; font-weight:500; color:#94A3B8; margin-top:1px;\">{{ todayLabel }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- notebook card -->\n  <div style=\"width:100%; max-width:1160px; background:#FFFFFF; border-radius:28px; box-shadow:0 40px 100px rgba(0,0,0,0.08); border:1px solid rgba(0,0,0,0.05); display:flex; align-items:stretch; overflow:hidden;\">\n\n    <!-- rail -->\n    <nav style=\"width:252px; flex:none; padding:30px 22px; display:flex; flex-direction:column; background:#FCFBF8; border-right:1px solid rgba(0,0,0,0.06);\">\n      <div style=\"font-size:11px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:#A8B0BC; margin:4px 8px 14px;\">Sections<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:4px;\">\n\n        <button onclick=\"{{ goCapture }}\" style=\"display:flex; align-items:center; justify-content:space-between; gap:8px; width:100%; padding:11px 14px; border:none; border-radius:12px; cursor:pointer; font-family:inherit; font-size:14.5px; text-align:left; background:{{ ns.capture.bg }}; color:{{ ns.capture.color }}; font-weight:{{ ns.capture.weight }}; transition:background .18s ease, color .18s ease;\">\n          <span>Capture<\u002Fspan>\n          <sc-if value=\"{{ inboxCount }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"flex:none; min-width:21px; height:21px; padding:0 6px; display:inline-flex; align-items:center; justify-content:center; border-radius:9999px; background:#EEF1F6; color:#64748B; font-size:11.5px; font-weight:700;\">{{ inboxCount }}<\u002Fspan><\u002Fsc-if>\n        <\u002Fbutton>\n\n        <button onclick=\"{{ goNext }}\" style=\"display:flex; align-items:center; justify-content:space-between; gap:8px; width:100%; padding:11px 14px; border:none; border-radius:12px; cursor:pointer; font-family:inherit; font-size:14.5px; text-align:left; background:{{ ns.next.bg }}; color:{{ ns.next.color }}; font-weight:{{ ns.next.weight }}; transition:background .18s ease, color .18s ease;\">\n          <span>Next Actions<\u002Fspan>\n          <sc-if value=\"{{ nextCount }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"flex:none; min-width:21px; height:21px; padding:0 6px; display:inline-flex; align-items:center; justify-content:center; border-radius:9999px; background:#EEF1F6; color:#64748B; font-size:11.5px; font-weight:700;\">{{ nextCount }}<\u002Fspan><\u002Fsc-if>\n        <\u002Fbutton>\n\n        <button onclick=\"{{ goWaiting }}\" style=\"display:flex; align-items:center; justify-content:space-between; gap:8px; width:100%; padding:11px 14px; border:none; border-radius:12px; cursor:pointer; font-family:inherit; font-size:14.5px; text-align:left; background:{{ ns.waiting.bg }}; color:{{ ns.waiting.color }}; font-weight:{{ ns.waiting.weight }}; transition:background .18s ease, color .18s ease;\">\n          <span>Waiting For<\u002Fspan>\n          <sc-if value=\"{{ waitCount }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"flex:none; min-width:21px; height:21px; padding:0 6px; display:inline-flex; align-items:center; justify-content:center; border-radius:9999px; background:#EEF1F6; color:#64748B; font-size:11.5px; font-weight:700;\">{{ waitCount }}<\u002Fspan><\u002Fsc-if>\n        <\u002Fbutton>\n\n        <button onclick=\"{{ goReview }}\" style=\"display:flex; align-items:center; justify-content:space-between; gap:8px; width:100%; padding:11px 14px; border:none; border-radius:12px; cursor:pointer; font-family:inherit; font-size:14.5px; text-align:left; background:{{ ns.review.bg }}; color:{{ ns.review.color }}; font-weight:{{ ns.review.weight }}; transition:background .18s ease, color .18s ease;\">\n          <span>Weekly Review<\u002Fspan>\n        <\u002Fbutton>\n\n      <\u002Fdiv>\n\n      <div style=\"flex:1;\"><\u002Fdiv>\n\n      <div style=\"margin:0 8px; padding-top:18px; border-top:1px solid rgba(0,0,0,0.06);\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#A8B0BC; margin-bottom:5px;\">Last review<\u002Fdiv>\n        <div style=\"font-size:13px; font-weight:600; color:#475569; margin-bottom:16px;\">{{ lastReviewedLabel }}<\u002Fdiv>\n        <div style=\"font-size:12px; font-weight:500; line-height:1.5; color:#A8B0BC;\">Capture → clarify → organize → do → review.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fnav>\n\n    <!-- page area -->\n    <main style=\"flex:1; min-height:640px; padding:44px 52px 48px; position:relative; background-color:#FFFFFF; background-image:{{ paperBg }}; background-size:{{ paperSize }};\">\n\n      <!-- CAPTURE -->\n      <sc-if value=\"{{ isCapture }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"width:100%; max-width:820px; margin:0 auto;\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:{{ accColor }}; margin-bottom:10px;\">Capture<\u002Fdiv>\n        <h2 style=\"margin:0 0 6px; font-size:30px; font-weight:800; letter-spacing:-0.02em; color:#111827; line-height:1.15;\">Empty your head<\u002Fh2>\n        <p style=\"margin:0 0 26px; font-size:15px; font-weight:500; line-height:1.55; color:#64748B;\">Your brain is for thinking, not for remembering. Drop every task, idea, and loose thread here — clarify it later.<\u002Fp>\n\n        <div style=\"background:#F8FAFB; border:1px solid #EAECEF; border-radius:16px; padding:18px 20px; display:flex; flex-direction:column; gap:13px;\">\n          <input ref=\"{{ capRef }}\" onkeydown=\"{{ onCapKey }}\" placeholder=\"What's on your mind?\" style=\"border:none; outline:none; background:transparent; font-family:inherit; font-size:18px; font-weight:500; color:#111827; width:100%;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:center;\">\n            <span style=\"font-size:12.5px; font-weight:500; color:#9AA3AF;\">Press Enter to drop it in. Nothing stays in your head.<\u002Fspan>\n            <button onclick=\"{{ addCapture }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:13.5px; font-weight:700; color:#fff; background:{{ accBg }}; padding:9px 18px; border-radius:10px; transition:background .18s ease;\" style-hover=\"background:{{ accDeep }};\">Capture →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; align-items:center; justify-content:space-between; margin:30px 0 16px;\">\n          <div style=\"font-size:15px; font-weight:700; color:#111827;\">Inbox<\u002Fdiv>\n          <div style=\"font-size:12.5px; font-weight:600; color:#9AA3AF;\">Ask of each: what's the next action?<\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ inboxHasItems }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fill, minmax(212px, 1fr)); gap:14px;\">\n          <sc-for list=\"{{ inboxCards }}\" as=\"card\" hint-placeholder-count=\"4\">\n            <div style=\"position:relative; background:#FCF7E9; border:1px solid rgba(17,24,39,0.07); border-radius:12px; padding:15px 15px 13px; box-shadow:0 1px 2px rgba(0,0,0,0.05); display:flex; flex-direction:column; transition:transform .2s var(--ease-out-soft), box-shadow .2s ease;\" style-hover=\"transform:translateY(-2px); box-shadow:0 10px 22px rgba(0,0,0,0.08);\">\n              <div style=\"font-size:14px; font-weight:500; line-height:1.45; color:#111827; margin-bottom:14px; flex:1;\">{{ card.text }}<\u002Fdiv>\n              <div style=\"display:flex; gap:6px; align-items:center;\">\n                <button onclick=\"{{ card.doNow }}\" title=\"Done in under 2 minutes\" style=\"display:inline-flex; align-items:center; gap:3px; border:none; cursor:pointer; font-family:inherit; font-size:11.5px; font-weight:600; color:{{ accColor }}; background:{{ accSoft }}; padding:5px 9px; border-radius:7px; transition:filter .15s ease;\" style-hover=\"filter:brightness(0.96);\">Do now<\u002Fbutton>\n                <button onclick=\"{{ card.toNext }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:11.5px; font-weight:600; color:#475569; background:#EFF1F4; padding:5px 9px; border-radius:7px; transition:background .15s ease;\" style-hover=\"background:#E2E6EB;\">Next<\u002Fbutton>\n                <button onclick=\"{{ card.toWaiting }}\" style=\"border:none; cursor:pointer; font-family:inherit; font-size:11.5px; font-weight:600; color:#475569; background:#EFF1F4; padding:5px 9px; border-radius:7px; transition:background .15s ease;\" style-hover=\"background:#E2E6EB;\">Waiting<\u002Fbutton>\n                <button onclick=\"{{ card.remove }}\" title=\"Trash\" style=\"margin-left:auto; border:none; cursor:pointer; background:transparent; color:#C6CDD6; font-size:17px; line-height:1; padding:2px 5px; border-radius:6px; transition:color .15s ease;\" style-hover=\"color:#E11D48;\">×<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ inboxEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex; flex-direction:column; align-items:center; text-align:center; padding:36px 20px 24px;\">\n          <img src=\"19cb5282-aa43-49ed-ad60-3a08e72ad94e\" alt=\"\" style=\"height:64px; width:64px; object-fit:contain; opacity:0.9; margin-bottom:16px;\">\n          <div style=\"font-size:20px; font-weight:800; letter-spacing:-0.01em; color:#111827; margin-bottom:5px;\">Inbox zero.<\u002Fdiv>\n          <div style=\"font-size:14px; font-weight:500; color:#94A3B8;\">Your head is clear. Capture the next thing the moment it appears.<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- NEXT ACTIONS -->\n      <sc-if value=\"{{ isNext }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:100%; max-width:760px; margin:0 auto;\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:{{ accColor }}; margin-bottom:10px;\">Next Actions<\u002Fdiv>\n        <h2 style=\"margin:0 0 6px; font-size:30px; font-weight:800; letter-spacing:-0.02em; color:#111827; line-height:1.15;\">What you'll actually do next<\u002Fh2>\n        <p style=\"margin:0 0 26px; font-size:15px; font-weight:500; line-height:1.55; color:#64748B;\">Concrete, physical next steps. Pick by where you are, the time you have, and what matters most.<\u002Fp>\n\n        <div style=\"display:flex; gap:10px; margin-bottom:8px;\">\n          <input ref=\"{{ nextRef }}\" onkeydown=\"{{ onNextKey }}\" placeholder=\"Add a next action…\" style=\"flex:1; height:46px; border:1px solid #EAECEF; background:#F8FAFB; border-radius:12px; padding:0 16px; font-family:inherit; font-size:15px; font-weight:500; color:#111827; outline:none;\" style-focus=\"border-color:{{ accColor }};\">\n          <button onclick=\"{{ addNext }}\" style=\"flex:none; border:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:700; color:#fff; background:{{ accBg }}; padding:0 22px; border-radius:12px; transition:background .18s ease;\" style-hover=\"background:{{ accDeep }};\">Add<\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ nextHasItems }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:8px;\">\n          <sc-for list=\"{{ nextRows }}\" as=\"row\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:center; gap:14px; padding:15px 6px; border-bottom:1px solid #F1F3F6;\">\n              <button onclick=\"{{ row.toggle }}\" title=\"Mark done\" style=\"flex:none; width:22px; height:22px; border-radius:50%; border:2px solid #CBD5E1; background:#fff; cursor:pointer; padding:0; transition:border-color .15s ease, background .15s ease;\" style-hover=\"border-color:{{ accColor }}; background:{{ accSoft }};\"><\u002Fbutton>\n              <span style=\"flex:1; font-size:15.5px; font-weight:500; color:#111827; line-height:1.4;\">{{ row.text }}<\u002Fspan>\n              <span style=\"flex:none; font-size:12px; font-weight:500; color:#9AA3AF;\">{{ row.when }}<\u002Fspan>\n              <button onclick=\"{{ row.remove }}\" title=\"Trash\" style=\"flex:none; border:none; cursor:pointer; background:transparent; color:#C6CDD6; font-size:18px; line-height:1; padding:2px 5px; border-radius:6px; transition:color .15s ease;\" style-hover=\"color:#E11D48;\">×<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasDoneToday }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:18px; font-size:13px; font-weight:600; color:{{ accColor }};\">✓ {{ doneTodayLabel }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ nextEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center; padding:40px 20px; font-size:14.5px; font-weight:500; color:#94A3B8;\">Nothing queued. Clarify something from your inbox, or add an action above.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- WAITING FOR -->\n      <sc-if value=\"{{ isWaiting }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:100%; max-width:760px; margin:0 auto;\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:{{ accColor }}; margin-bottom:10px;\">Waiting For<\u002Fdiv>\n        <h2 style=\"margin:0 0 6px; font-size:30px; font-weight:800; letter-spacing:-0.02em; color:#111827; line-height:1.15;\">Things other people owe you<\u002Fh2>\n        <p style=\"margin:0 0 26px; font-size:15px; font-weight:500; line-height:1.55; color:#64748B;\">Hand it off, then track it here. Review on your weekly cadence and nudge anything overdue.<\u002Fp>\n\n        <div style=\"display:flex; gap:10px; margin-bottom:8px;\">\n          <input ref=\"{{ waitWhatRef }}\" onkeydown=\"{{ onWaitKey }}\" placeholder=\"What are you waiting on?\" style=\"flex:1.6; height:46px; border:1px solid #EAECEF; background:#F8FAFB; border-radius:12px; padding:0 16px; font-family:inherit; font-size:15px; font-weight:500; color:#111827; outline:none;\" style-focus=\"border-color:{{ accColor }};\">\n          <input ref=\"{{ waitWhoRef }}\" onkeydown=\"{{ onWaitKey }}\" placeholder=\"From whom?\" style=\"flex:1; height:46px; border:1px solid #EAECEF; background:#F8FAFB; border-radius:12px; padding:0 16px; font-family:inherit; font-size:15px; font-weight:500; color:#111827; outline:none;\" style-focus=\"border-color:{{ accColor }};\">\n          <button onclick=\"{{ addWaiting }}\" style=\"flex:none; border:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:700; color:#fff; background:{{ accBg }}; padding:0 22px; border-radius:12px; transition:background .18s ease;\" style-hover=\"background:{{ accDeep }};\">Add<\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ waitHasItems }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:8px;\">\n          <sc-for list=\"{{ waitRows }}\" as=\"row\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; align-items:center; gap:14px; padding:15px 6px; border-bottom:1px solid #F1F3F6;\">\n              <span style=\"flex:none; width:9px; height:9px; border-radius:50%; background:#FBBF24;\"><\u002Fspan>\n              <div style=\"flex:1; min-width:0;\">\n                <div style=\"font-size:15.5px; font-weight:500; color:#111827; line-height:1.4;\">{{ row.text }}<\u002Fdiv>\n                <sc-if value=\"{{ row.hasWho }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"font-size:12.5px; font-weight:600; color:#94A3B8; margin-top:2px;\">from {{ row.who }}<\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n              <span style=\"flex:none; font-size:12px; font-weight:500; color:#9AA3AF;\">waiting {{ row.since }}<\u002Fspan>\n              <button onclick=\"{{ row.got }}\" title=\"Received it\" style=\"flex:none; display:inline-flex; align-items:center; gap:3px; border:none; cursor:pointer; font-family:inherit; font-size:12px; font-weight:600; color:{{ accColor }}; background:{{ accSoft }}; padding:6px 11px; border-radius:8px; transition:filter .15s ease;\" style-hover=\"filter:brightness(0.96);\">Got it<\u002Fbutton>\n              <button onclick=\"{{ row.remove }}\" title=\"Trash\" style=\"flex:none; border:none; cursor:pointer; background:transparent; color:#C6CDD6; font-size:18px; line-height:1; padding:2px 5px; border-radius:6px; transition:color .15s ease;\" style-hover=\"color:#E11D48;\">×<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ waitEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center; padding:40px 20px; font-size:14.5px; font-weight:500; color:#94A3B8;\">Nobody owes you anything right now. The ball's in your court.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- WEEKLY REVIEW -->\n      <sc-if value=\"{{ isReview }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:100%; max-width:780px; margin:0 auto;\">\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:{{ accColor }}; margin-bottom:10px;\">Weekly Review<\u002Fdiv>\n        <h2 style=\"margin:0 0 6px; font-size:30px; font-weight:800; letter-spacing:-0.02em; color:#111827; line-height:1.15;\">Keep the system trustworthy<\u002Fh2>\n        <p style=\"margin:0 0 26px; font-size:15px; font-weight:500; line-height:1.55; color:#64748B;\">Once a week, clean it all. What's stuck, what's overdue, what matters now. This is what makes you trust the system enough to let go.<\u002Fp>\n\n        <div style=\"display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin-bottom:30px;\">\n          <div style=\"background:#F8FAFB; border:1px solid #EEF0F3; border-radius:16px; padding:16px 18px;\">\n            <div style=\"font-size:32px; font-weight:800; letter-spacing:-0.02em; color:#111827; line-height:1;\">{{ inboxCount }}<\u002Fdiv>\n            <div style=\"font-size:11px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:#94A3B8; margin-top:6px;\">In inbox<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#F8FAFB; border:1px solid #EEF0F3; border-radius:16px; padding:16px 18px;\">\n            <div style=\"font-size:32px; font-weight:800; letter-spacing:-0.02em; color:#111827; line-height:1;\">{{ nextCount }}<\u002Fdiv>\n            <div style=\"font-size:11px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:#94A3B8; margin-top:6px;\">Next actions<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#F8FAFB; border:1px solid #EEF0F3; border-radius:16px; padding:16px 18px;\">\n            <div style=\"font-size:32px; font-weight:800; letter-spacing:-0.02em; color:#111827; line-height:1;\">{{ waitCount }}<\u002Fdiv>\n            <div style=\"font-size:11px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:#94A3B8; margin-top:6px;\">Waiting for<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#F8FAFB; border:1px solid #EEF0F3; border-radius:16px; padding:16px 18px;\">\n            <div style=\"font-size:32px; font-weight:800; letter-spacing:-0.02em; color:{{ accColor }}; line-height:1;\">{{ doneWeekCount }}<\u002Fdiv>\n            <div style=\"font-size:11px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:#94A3B8; margin-top:6px;\">Done this week<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-size:15px; font-weight:700; color:#111827; margin-bottom:14px;\">The ritual<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <sc-for list=\"{{ reviewSteps }}\" as=\"step\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ step.toggle }}\" style=\"display:flex; align-items:flex-start; gap:14px; width:100%; text-align:left; background:#FCFBF8; border:1px solid #EEF0F3; border-radius:14px; padding:16px 18px; cursor:pointer; font-family:inherit; transition:background .15s ease;\" style-hover=\"background:#F6F5F1;\">\n              <span style=\"flex:none; width:26px; height:26px; border-radius:7px; border:2px solid {{ step.boxBorder }}; background:{{ step.boxBg }}; display:flex; align-items:center; justify-content:center; color:#fff; margin-top:1px;\">\n                <sc-if value=\"{{ step.checked }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:14px; font-weight:800; line-height:1;\">✓<\u002Fspan><\u002Fsc-if>\n              <\u002Fspan>\n              <span style=\"flex:1;\">\n                <span style=\"display:block; font-size:15px; font-weight:700; color:#111827;\">{{ step.title }}<\u002Fspan>\n                <span style=\"display:block; font-size:13px; font-weight:500; color:#64748B; margin-top:2px; line-height:1.45;\">{{ step.desc }}<\u002Fspan>\n              <\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ allReviewed }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:22px; display:flex; align-items:center; gap:18px; background:{{ accSoft }}; border-radius:16px; padding:18px 22px;\">\n          <img src=\"19cb5282-aa43-49ed-ad60-3a08e72ad94e\" alt=\"\" style=\"height:48px; width:48px; object-fit:contain;\">\n          <div style=\"flex:1;\">\n            <div style=\"font-size:15.5px; font-weight:800; color:#111827;\">Your system is trustworthy again.<\u002Fdiv>\n            <div style=\"font-size:13px; font-weight:500; color:#64748B; margin-top:1px;\">Close the loop and start the week clean.<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ completeReview }}\" style=\"flex:none; border:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:700; color:#fff; background:{{ accBg }}; padding:11px 20px; border-radius:12px; transition:background .18s ease;\" style-hover=\"background:{{ accDeep }};\">Complete review →<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ notAllReviewed }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:18px; font-size:13.5px; font-weight:600; color:#94A3B8;\">{{ reviewProgressLabel }} — check off each step to close your review.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:22px; font-size:12.5px; font-weight:500; color:#A8A095; text-align:center;\">Your brain is for thinking, not for remembering.<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Green&quot;,&quot;options&quot;:[&quot;Blue&quot;,&quot;Navy&quot;,&quot;Green&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;paper&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Dotted&quot;,&quot;options&quot;:[&quot;Plain&quot;,&quot;Lined&quot;,&quot;Dotted&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  capRef = React.createRef();\n  nextRef = React.createRef();\n  waitWhatRef = React.createRef();\n  waitWhoRef = React.createRef();\n\n  state = this.load();\n\n  load() {\n    let saved = null;\n    try { saved = JSON.parse(localStorage.getItem('gtd_ceo_v2')); } catch (e) {}\n    if (saved && Array.isArray(saved.items)) {\n      return {\n        page: saved.page || 'capture',\n        items: saved.items,\n        review: saved.review || this.freshReview(),\n        lastReviewedAt: saved.lastReviewedAt || null,\n      };\n    }\n    return { page: 'capture', items: this.sample(), review: this.freshReview(), lastReviewedAt: null };\n  }\n\n  freshReview() { return { clear: false, current: false, waiting: false, creative: false }; }\n  uid() { return 'i' + Math.random().toString(36).slice(2, 9); }\n  ago(days) { return Date.now() - days * 86400000; }\n\n  sample() {\n    const mk = (text, bucket, age, extra) => Object.assign({ id: this.uid(), text, bucket, createdAt: this.ago(age) }, extra || {});\n    return [\n      mk(\"Reply to the Vodafone partnership email — they want a call next week\", 'inbox', 0),\n      mk(\"Outline the Q3 board deck\", 'inbox', 1),\n      mk(\"Idea: a weekly async product demo, recorded for the whole company\", 'inbox', 1),\n      mk(\"Renew the cyber-insurance policy before it lapses\", 'inbox', 2),\n      mk(\"Decide on the Riyadh office — full lease vs. co-working for now\", 'inbox', 3),\n      mk(\"Call the lead investor to confirm Thursday's meeting\", 'next', 0),\n      mk(\"Review & approve the new pricing-page copy\", 'next', 1),\n      mk(\"Sign the updated DPA for the enterprise deal\", 'next', 1),\n      mk(\"Draft the all-hands agenda\", 'next', 2),\n      mk(\"Legal redlines on the enterprise MSA\", 'waiting', 2, { who: 'Amira' }),\n      mk(\"Updated financial model for the raise\", 'waiting', 4, { who: 'Yusuf' }),\n      mk(\"Onboarding redesign mocks\", 'waiting', 1, { who: 'Product' }),\n      mk(\"Reference-check callback on the VP Eng candidate\", 'waiting', 6, { who: 'Maya' }),\n      mk(\"Approve the brand-refresh direction\", 'done', 0, { completedAt: Date.now() - 4 * 3600000 }),\n      mk(\"Send the May investor update\", 'done', 2, { completedAt: this.ago(2) }),\n    ];\n  }\n\n  save() {\n    const { items, review, lastReviewedAt, page } = this.state;\n    try { localStorage.setItem('gtd_ceo_v2', JSON.stringify({ items, review, lastReviewedAt, page })); } catch (e) {}\n  }\n\n  setItems(fn) { this.setState(s => ({ items: fn(s.items) }), () => this.save()); }\n  go(page) { this.setState({ page }, () => this.save()); }\n  move(id, bucket) { this.setItems(items => items.map(i => i.id === id ? Object.assign({}, i, { bucket }) : i)); }\n  done(id) { this.setItems(items => items.map(i => i.id === id ? Object.assign({}, i, { bucket: 'done', completedAt: Date.now() }) : i)); }\n  del(id) { this.setItems(items => items.filter(i => i.id !== id)); }\n\n  addCapture() {\n    const el = this.capRef.current; if (!el) return;\n    const t = el.value.trim(); if (!t) return;\n    const item = { id: this.uid(), text: t, bucket: 'inbox', createdAt: Date.now() };\n    this.setItems(items => [item, ...items]);\n    el.value = ''; el.focus();\n  }\n  addNext() {\n    const el = this.nextRef.current; if (!el) return;\n    const t = el.value.trim(); if (!t) return;\n    const item = { id: this.uid(), text: t, bucket: 'next', createdAt: Date.now() };\n    this.setItems(items => [...items, item]);\n    el.value = ''; el.focus();\n  }\n  addWaiting() {\n    const a = this.waitWhatRef.current, b = this.waitWhoRef.current; if (!a) return;\n    const t = a.value.trim(); if (!t) return;\n    const who = (b && b.value.trim()) || '';\n    const item = { id: this.uid(), text: t, bucket: 'waiting', createdAt: Date.now(), who };\n    this.setItems(items => [...items, item]);\n    a.value = ''; if (b) b.value = ''; a.focus();\n  }\n  toggleReview(k) { this.setState(s => ({ review: Object.assign({}, s.review, { [k]: !s.review[k] }) }), () => this.save()); }\n  completeReview() { this.setState({ review: this.freshReview(), lastReviewedAt: Date.now() }, () => this.save()); }\n\n  rel(ts) {\n    const d = Math.floor((Date.now() - ts) / 86400000);\n    if (d <= 0) return 'today';\n    if (d === 1) return 'yesterday';\n    if (d < 7) return d + 'd ago';\n    const w = Math.floor(d / 7);\n    return w === 1 ? 'a week ago' : w + 'w ago';\n  }\n\n  renderVals() {\n    const s = this.state;\n    const ACC = {\n      Blue: ['#2B7AF3', '#1D4ED8', 'rgba(43,122,243,0.12)'],\n      Navy: ['#111827', '#000000', 'rgba(17,24,39,0.08)'],\n      Green: ['#5B9E12', '#4D8610', 'rgba(91,158,18,0.14)'],\n    };\n    const acc = ACC[this.props.accent] || ACC.Blue;\n    const PAP = {\n      Plain: ['none', 'auto'],\n      Lined: ['repeating-linear-gradient(to bottom, transparent 0, transparent 33px, rgba(17,24,39,0.05) 33px, rgba(17,24,39,0.05) 34px)', 'auto'],\n      Dotted: ['radial-gradient(rgba(17,24,39,0.07) 1px, transparent 1.6px)', '22px 22px'],\n    };\n    const pap = PAP[this.props.paper] || PAP.Plain;\n\n    const items = s.items;\n    const inbox = items.filter(i => i.bucket === 'inbox');\n    const next = items.filter(i => i.bucket === 'next');\n    const waiting = items.filter(i => i.bucket === 'waiting');\n    const doneWeek = items.filter(i => i.bucket === 'done' && i.completedAt && (Date.now() - i.completedAt) < 7 * 86400000);\n    const doneToday = items.filter(i => i.bucket === 'done' && i.completedAt && (Date.now() - i.completedAt) < 86400000);\n\n    const ns = {};\n    ['capture', 'next', 'waiting', 'review'].forEach(k => {\n      const on = s.page === k;\n      ns[k] = { bg: on ? acc[2] : 'transparent', color: on ? acc[0] : '#334155', weight: on ? '700' : '600' };\n    });\n\n    const reviewDefs = [\n      { key: 'clear', title: 'Get clear', desc: 'Empty your inbox to zero — clarify every captured note.' },\n      { key: 'current', title: 'Get current', desc: 'Walk every next action. Is it still the right next step?' },\n      { key: 'waiting', title: 'Chase what you\\u2019re waiting on', desc: 'Scan the waiting-for list. Nudge anything that\\u2019s gone quiet.' },\n      { key: 'creative', title: 'Get creative', desc: 'Look up from the list. What matters most this coming week?' },\n    ];\n    const reviewSteps = reviewDefs.map(r => {\n      const checked = !!s.review[r.key];\n      return {\n        key: r.key, title: r.title, desc: r.desc, checked,\n        boxBorder: checked ? acc[0] : '#CBD5E1',\n        boxBg: checked ? acc[0] : '#FFFFFF',\n        toggle: () => this.toggleReview(r.key),\n      };\n    });\n    const checkedCount = reviewSteps.filter(r => r.checked).length;\n    const allReviewed = checkedCount === reviewSteps.length;\n\n    const now = new Date();\n    const h = now.getHours();\n    const greeting = h < 12 ? 'Good morning' : (h < 18 ? 'Good afternoon' : 'Good evening');\n\n    return {\n      greeting,\n      todayLabel: now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' }),\n\n      ns,\n      accBg: acc[0], accDeep: acc[1], accSoft: acc[2], accColor: acc[0],\n      paperBg: pap[0], paperSize: pap[1],\n\n      goCapture: () => this.go('capture'),\n      goNext: () => this.go('next'),\n      goWaiting: () => this.go('waiting'),\n      goReview: () => this.go('review'),\n\n      isCapture: s.page === 'capture',\n      isNext: s.page === 'next',\n      isWaiting: s.page === 'waiting',\n      isReview: s.page === 'review',\n\n      inboxCount: inbox.length,\n      nextCount: next.length,\n      waitCount: waiting.length,\n      doneWeekCount: doneWeek.length,\n\n      capRef: this.capRef,\n      onCapKey: (e) => { if (e.key === 'Enter') { e.preventDefault(); this.addCapture(); } },\n      addCapture: () => this.addCapture(),\n      inboxHasItems: inbox.length > 0,\n      inboxEmpty: inbox.length === 0,\n      inboxCards: inbox.map(i => ({\n        id: i.id, text: i.text,\n        doNow: () => this.done(i.id),\n        toNext: () => this.move(i.id, 'next'),\n        toWaiting: () => this.move(i.id, 'waiting'),\n        remove: () => this.del(i.id),\n      })),\n\n      nextRef: this.nextRef,\n      onNextKey: (e) => { if (e.key === 'Enter') { e.preventDefault(); this.addNext(); } },\n      addNext: () => this.addNext(),\n      nextHasItems: next.length > 0,\n      nextEmpty: next.length === 0,\n      nextRows: next.map(i => ({\n        id: i.id, text: i.text, when: this.rel(i.createdAt),\n        toggle: () => this.done(i.id),\n        remove: () => this.del(i.id),\n      })),\n      hasDoneToday: doneToday.length > 0,\n      doneTodayLabel: doneToday.length === 1 ? '1 done today' : doneToday.length + ' done today',\n\n      waitWhatRef: this.waitWhatRef,\n      waitWhoRef: this.waitWhoRef,\n      onWaitKey: (e) => { if (e.key === 'Enter') { e.preventDefault(); this.addWaiting(); } },\n      addWaiting: () => this.addWaiting(),\n      waitHasItems: waiting.length > 0,\n      waitEmpty: waiting.length === 0,\n      waitRows: waiting.map(i => ({\n        id: i.id, text: i.text,\n        who: i.who || '', hasWho: !!(i.who && i.who.trim()),\n        since: this.rel(i.createdAt),\n        got: () => this.done(i.id),\n        remove: () => this.del(i.id),\n      })),\n\n      reviewSteps,\n      allReviewed,\n      notAllReviewed: !allReviewed,\n      reviewProgressLabel: checkedCount + ' of ' + reviewSteps.length + ' complete',\n      completeReview: () => this.completeReview(),\n      lastReviewedLabel: s.lastReviewedAt ? this.rel(s.lastReviewedAt) : 'not yet — start one',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
